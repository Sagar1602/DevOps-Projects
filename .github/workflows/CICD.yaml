name: CICD_Workflow
on: [push]
jobs:
  CODE_CHECKOUT:
    runs-on: ubuntu-latest
    steps:
      - name: Code_Checkout
        uses: actions/checkout@v4

  BUILD:
    runs-on: ubuntu-latest
    needs: CODE_CHECKOUT
    steps:
      - name: Code_Checkout
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: NPM Install 
        working-directory: DevOps Project-1/Website
        run: npm install  
         

      - name: HTML-Validator
        working-directory: DevOps Project-1/Website
        run: npx html-validate "**/*.html"
