name: CICD_Workflow
on: [push]
jobs:
  CLEAN_WORKSPACE:
    runs-on: self-hosted
    steps:
      - name: cleanup workspace 
        run: |
          rm -rf ./* ./.??* || true


  CODE_CHECKOUT:
    needs: CLEAN_WORKSPACE
    runs-on: self-hosted
    steps:
      - name: Code_Checkout
        uses: actions/checkout@v4

  BUILD:
    runs-on: self-hosted

    needs: CODE_CHECKOUT
    steps:
      - name: Code_Checkout
        uses: actions/checkout@v4

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 
       
      - name: verifying the node version and npm version
        working-directory: DevOps Project-1/Website
        run: |
          pwd
          node --version
          npm --version
          
          npm list html-validate

      - name: NPM Install 
        working-directory: DevOps Project-1/Website
        run: |
          npm install
          npm list html-validate  

      - name: Check html-validate version
        working-directory: DevOps Project-1/Website
        run: npm list html-validate    
         

      - name: HTML-Validator
        continue-on-error: true
        working-directory: DevOps Project-1/Website
        run: npx html-validate index.html

      - name: PHS validator
        run: php -l "DevOps Project-1/Website/sendemail.php"  
  
  SONARQUBE_ANALYSIS:
    runs-on: self-hosted
    needs: BUILD
    steps:
      - name: Sonarqube Analysis
        run: |
    
          ls -l /opt/sonar-scanner/bin
          /opt/sonar-scanner/bin/sonar-scanner \
          -Dsonar.projectKey=static-web-application \
          -Dsonar.projectName=static-web-application \
          -Dsonar.sources=. \
          -Dsonar.host.url=${{ secrets.SONARQUBE_SERVER }} \
          -Dsonar.login=${{ secrets.SONARQUBE_TOKEN }}
  DOCKER_BUILD:
    runs-on: self-hosted
    needs: SONARQUBE_ANALYSIS
    steps: 
     # - name: Deleting the pervious  build docker image 
     #   run: docker rmi static-website-image:${{github.run_number}}

      - name: Docker image build
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/static-website-image:${{github.run_number}} "DevOps Project-1/Website"

      - name: docker ps 
        run: docker images 
  Trivy_SCAN:
    runs-on: self-hosted
    needs: DOCKER_BUILD
    steps:
      - name: Trivy Scan
        run: |
          trivy image \
          --format table \
          --template "@contrib/html.tpl" \
          -o trivy-report.html \
          ${{secrets.DOCKER_USERNAME}}/static-website-image:${{ github.run_number }}

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.html

  DOCKER_IMAGE_PUSH:
    runs-on: self-hosted
    needs: Trivy_SCAN
    steps:
      - name: Docker_Login
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}} 
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Docker_Registry_Push
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/static-website-image:${{github.run_number}}

  ECR_PUSH:
    runs-on: self-hosted
    needs: DOCKER_IMAGE_PUSH
    steps:
      - name: AWS configure
        uses: aws-actions/configure-aws-credentials@v4 
        with:
          aws-access-key-id: ${{secrets.AWS_ACCSS_KEY_ID}}
          aws-secrets-access-key: ${{secrets.AWS_SECRETS_ACCESS_KEY}}
          aws-region: ap-south-2

      - name: Login TO AWS ECR
        uses: aws-actions/amazon-ecr-login@v2 

      - name: Check Docker Images
        run: docker images

      - name: Tag DOCKER Image to ECR 
        run: |
          docker tag \
          ${{secrets.DOCKER_USERNAME}}/static-website-image:${{ github.run_number }} \
          893097420093.dkr.ecr.ap-south-2.amazonaws.com/docker-images:${{ github.run_number }}

      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-2.amazonaws.com/docker-images:${{ github.run_number }}    
  
